services:
  # ============================================================================
  # WatchDogs Video Analysis System - Main Service
  # ============================================================================
  watchdogs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchdogs-video-analysis
    restart: unless-stopped
    
    # Environment variables from .env file
    env_file:
      - .env
    
    # Override environment for Docker deployment
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - TEMP_VIDEO_PATH=/app/data/temp
      # LLM provider — Groq cloud API (Llama 4 Scout with vision)
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1
      - OPENAI_MODEL=meta-llama/llama-4-scout-17b-16e-instruct
      - OPENAI_API_KEY=${GROQ_API_KEY}
      # Groq is fast — 180s safe for 16 parallel agents (all 3 military blocks)
      - AGENT_TIMEOUT_SECONDS=${AGENT_TIMEOUT_SECONDS:-180}
      # Military Intelligence Blocks 1-3 (all enabled by default)
      - VEHICLE_DETECTION_ENABLED=${VEHICLE_DETECTION_ENABLED:-true}
      - WEAPON_DETECTION_ENABLED=${WEAPON_DETECTION_ENABLED:-true}
      - CROWD_ANALYSIS_ENABLED=${CROWD_ANALYSIS_ENABLED:-true}
      - SHADOW_ANALYSIS_ENABLED=${SHADOW_ANALYSIS_ENABLED:-true}
      - INFRASTRUCTURE_ANALYSIS_ENABLED=${INFRASTRUCTURE_ANALYSIS_ENABLED:-true}
      - TEMPORAL_COMPARISON_ENABLED=${TEMPORAL_COMPARISON_ENABLED:-true}
      - NIGHT_VISION_ENABLED=${NIGHT_VISION_ENABLED:-true}
      - NATO_SYMBOLOGY_ENABLED=${NATO_SYMBOLOGY_ENABLED:-true}
      - MULTI_MONITOR_ENABLED=${MULTI_MONITOR_ENABLED:-true}
    
    # Port mapping
    ports:
      - "5000:5000"
    
    # Persistent volumes
    volumes:
      # Named volume for persistent video storage (survives container rebuilds)
      - video_storage:/app/data/temp
    
    # Resource limits (16 parallel agents + gunicorn 2 workers)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: '4G'
        reservations:
          cpus: '1.0'
          memory: '1G'
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Network
    networks:
      - watchdogs-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  video_storage:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  watchdogs-network:
    driver: bridge
